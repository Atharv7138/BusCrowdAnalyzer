<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login | Bus Crowd Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

<style>
:root{
    --accent:#7a3cff;
}

body{
    margin:0;
    font-family: 'Poppins', system-ui, sans-serif;
    background:#f3f4f8;
    color:#1f2937;
}

/* BACK CANVAS */
.canvas{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 10% 10%, rgba(122,60,255,.15), transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(122,60,255,.12), transparent 40%);
    z-index:-1;
}

/* TOP TITLE */
.site-title{
    padding:30px 50px;
    font-size:26px;
    font-weight:700;
    color:var(--accent);
}

/* MAIN AREA */
.main{
    min-height:calc(100vh - 120px);
    display:flex;
    align-items:center;
}

/* LOGIN WRAP */
.login-wrap{
    background:#fff;
    border-radius:22px;
    padding:50px;
    box-shadow:
        0 30px 80px rgba(0,0,0,0.12);
    position:relative;
}

/* FLOAT TAG */
.tag{
    position:absolute;
    top:-16px;
    left:30px;
    background:var(--accent);
    color:#fff;
    padding:6px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}

/* LEFT TEXT */
.hero-text h1{
    font-size:46px;
    font-weight:800;
    line-height:1.2;
}
.hero-text span{
    color:var(--accent);
}
.hero-text p{
    color:#6b7280;
    font-size:16px;
    margin-top:15px;
}

/* FORM */
.form-control{
    height:50px;
    border-radius:14px;
    border:1px solid #e5e7eb;
    padding-left:44px;
}
.form-control:focus{
    border-color:var(--accent);
    box-shadow:none;
}

/* INPUT ICON */
.input-box{
    position:relative;
}
.input-box i{
    position:absolute;
    top:50%;
    left:16px;
    transform:translateY(-50%);
    color:#9ca3af;
}

/* BUTTON */
.btn-login{
    height:52px;
    border-radius:16px;
    background:var(--accent);
    color:#fff;
    font-weight:700;
    border:none;
    transition:.3s;
}
.btn-login:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 30px rgba(122,60,255,.4);
}

/* RESPONSIVE */
@media(max-width:768px){
    .hero-text h1{
        font-size:34px;
    }
    .login-wrap{
        padding:35px;
    }
}
</style>
</head>

<body>

<div class="canvas"></div>

<div class="site-title">
    Bus Crowd Analyzer
</div>

<div class="main">
<div class="container">
<div class="row align-items-center justify-content-center">

    <!-- LEFT CONTENT -->
    <div class="col-lg-6 mb-4 hero-text">
        <h1>
            Admin<br>
            <span>Command Center</span>
        </h1>
        <p>
            Monitor buses, control depots, analyze real-time crowd
            data and manage the smart transport system from one place.
        </p>
    </div>

    <!-- LOGIN CARD -->
    <div class="col-lg-5">
        <div class="login-wrap">

            <div class="tag">SECURE ACCESS</div>

            <form action="Alogin" method="post">
                <div class="form-group input-box">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" class="form-control"
                           placeholder="Admin Email" required>
                </div>

                <div class="form-group input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" class="form-control"
                           placeholder="Password" required>
                </div>

                <button class="btn btn-login btn-block mt-4">
                    Enter Dashboard
                </button>
            </form>

        </div>
    </div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
