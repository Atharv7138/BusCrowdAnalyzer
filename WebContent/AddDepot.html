<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#7a3cff;
    --secondary:#9f7cff;
    --bg:#f4f6fb;
    --dark:#1f1f2e;
}

body{
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    margin:0;
}

/* NAVBAR */
.navbar{
    background:#fff;
    box-shadow:0 6px 25px rgba(0,0,0,.08);
}
.navbar-brand{
    font-weight:700;
    color:var(--primary)!important;
    font-size:22px;
}
.navbar-nav .nav-link{
    font-weight:500;
    color:#444;
}
.navbar-nav .nav-link.active,
.navbar-nav .nav-link:hover{
    color:var(--primary);
}

/* PAGE WRAPPER */
.page-wrapper{
    padding:40px 0;
}

/* CARD LAYOUT */
.admin-card{
    background:#fff;
    border-radius:22px;
    box-shadow:0 30px 70px rgba(122,60,255,.18);
    overflow:hidden;
}

/* LEFT PANEL */
.side-panel{
    background:linear-gradient(160deg,var(--primary),var(--secondary));
    color:#fff;
    padding:40px 30px;
    height:100%;
}
.side-panel h3{
    font-weight:700;
}
.side-panel p{
    opacity:.9;
    margin-top:10px;
}
.side-panel i{
    font-size:80px;
    opacity:.15;
    position:absolute;
    bottom:30px;
    right:30px;
}

/* FORM PANEL */
.form-panel{
    padding:40px;
}
.form-panel h5{
    font-weight:600;
    margin-bottom:25px;
}

/* INPUT GROUP */
.input-group-text{
    background:#f3f0ff;
    border:none;
    color:var(--primary);
}
.form-control{
    height:52px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:14px;
}
.form-control:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 2px rgba(122,60,255,.2);
}

/* BUTTON */
.btn-primary{
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    border:none;
    border-radius:14px;
    padding:12px;
    font-weight:600;
}
.btn-primary:hover{
    opacity:.9;
}

/* FOOTER */
footer{
    text-align:center;
    font-size:13px;
    color:#777;
    padding:15px;
    margin-top:30px;
}

/* MOBILE */
@media(max-width:768px){
    .side-panel{
        text-align:center;
        padding:30px;
    }
    .side-panel i{
        display:none;
    }
}
</style>
</head>

<body>

<!-- CONTENT -->
<div class="container page-wrapper">
<!-- Back Button -->
<button type="button" class="btn btn-light mb-3" onclick="window.history.back();">
    <i class="fas fa-arrow-left mr-2"></i>Back
</button>

<div class="admin-card">
<div class="row no-gutters">

    <!-- LEFT INFO -->
    <div class="col-lg-4 position-relative">
        <div class="side-panel">
            <h3>Add Bus Depot</h3>
            <p>
                Register a new depot into the system.
                This information will be used for route
                allocation and crowd monitoring.
            </p>
            <i class="fas fa-bus"></i>
        </div>
    </div>

    <!-- FORM -->
    <div class="col-lg-8">
        <div class="form-panel">

            <h5>Depot Details</h5>

            <form action="Adddepot" method="post">

                <div class="form-group">
                    <label>Depot Name</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fas fa-warehouse"></i></span>
                        </div>
                        <input type="text" name="name" class="form-control" placeholder="Enter depot name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fas fa-map-marker-alt"></i></span>
                        </div>
                        <input type="text" name="location" class="form-control" placeholder="Enter location" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Contact Number</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                        </div>
                        <input type="text" name="contact" class="form-control" placeholder="Enter contact number" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        </div>
                        <input type="email" name="email" class="form-control" placeholder="Enter email address" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        </div>
                        <input type="password" name="password" class="form-control" placeholder="Create password" required>
                    </div>
                </div>

                <button class="btn btn-primary btn-block mt-4">
                    <i class="fas fa-plus-circle mr-2"></i>Add Depot
                </button>

            </form>

        </div>
    </div>

</div>
</div>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
